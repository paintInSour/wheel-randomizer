<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel Randomizer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
    body { background: linear-gradient(145deg, #f0edff 0%, #e8f4ff 45%, #fce8f6 100%); min-height: 100vh; }

    .result-pop {
      animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .spin-btn {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.38);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.48);
    }
    .spin-btn:active:not(:disabled) { transform: translateY(0); }
    .spin-btn:disabled { background: #e2e8f0; box-shadow: none; color: #94a3b8; cursor: not-allowed; }

    .add-btn {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.32);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .add-btn:hover:not(:disabled) { transform: scale(1.08); }
    .add-btn:disabled { background: #e2e8f0; box-shadow: none; color: #94a3b8; cursor: not-allowed; }

    .opt-row { transition: background 0.15s ease; }
    .opt-row:hover { background: #f5f0ff; }
    .icon-btn { transition: color 0.15s ease, transform 0.15s ease; }
    .icon-btn:hover { transform: scale(1.15); }

    .remove-winner-btn {
      background: linear-gradient(135deg, #dc2626, #f87171);
      color: #fff;
      border: none;
      box-shadow: 0 4px 14px rgba(220, 38, 38, 0.45);
    }
    .remove-winner-btn:hover {
      background: linear-gradient(135deg, #b91c1c, #ef4444);
      box-shadow: 0 6px 18px rgba(220, 38, 38, 0.6);
    }

    .card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
    .scroll-area { scrollbar-width: thin; scrollbar-color: #d1c4f0 transparent; }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: #d1c4f0; border-radius: 4px; }

    /* ── Floating panels (save / my-wheels) ── */
    .float-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      z-index: 100;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 16px 48px rgba(124, 58, 237, 0.18), 0 2px 8px rgba(0,0,0,0.07);
      border: 1px solid rgba(210, 195, 255, 0.45);
      animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .wheel-row { transition: background 0.12s ease; border-radius: 14px; }
    .wheel-row:hover { background: #f5f0ff; }
    .wheel-row.is-active { background: #ede9fe; }

    .load-btn {
      font-size: 11px;
      font-weight: 700;
      color: #7c3aed;
      padding: 4px 10px;
      border-radius: 9px;
      border: 1.5px solid rgba(167, 139, 250, 0.4);
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .load-btn:hover { background: #ede9fe; }
    .load-btn.current { background: #7c3aed; color: #fff; border-color: transparent; cursor: default; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 60, 0.35);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn 0.15s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .modal-card {
      background: rgba(255,255,255,0.98);
      border-radius: 28px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 24px 64px rgba(124, 58, 237, 0.22), 0 4px 16px rgba(0,0,0,0.08);
      animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .wheel-corner-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: #6d28d9;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(196, 181, 253, 0.55);
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.14);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .wheel-corner-btn:hover { background: rgba(237, 233, 254, 0.95); box-shadow: 0 4px 14px rgba(124,58,237,0.22); transform: scale(1.04); }
    .wheel-corner-btn.open  { background: rgba(237, 233, 254, 0.97); }

    @media (max-width: 768px) {
      input { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ── Rainbow palette ─────────────────────────────────────────── */
    const RAINBOW = [
      '#FF6B6B', '#FF9F43', '#FECA57', '#2ECC71',
      '#3498DB', '#9B59B6', '#FF79C6', '#1ABC9C',
      '#E67E22', '#45AAF2', '#FD79A8', '#00B894',
    ];

    /* ── SVG icon helpers ─────────────────────────────────────────── */
    const Icon = ({ d, size = 15, ...p }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2.5"
           strokeLinecap="round" strokeLinejoin="round" {...p}>
        {d}
      </svg>
    );
    const EditIcon    = () => <Icon d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>} />;
    const TrashIcon   = () => <Icon d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>} />;
    const CheckIcon   = () => <Icon d={<polyline points="20 6 9 17 4 12"/>} />;
    const PlusIcon     = () => <Icon d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
    const BookmarkIcon = () => <Icon d={<><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></>} />;
    const LayersIcon  = () => <Icon d={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;
    const FolderIcon  = () => <Icon d={<><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></>} />;

    /* ── Canvas wheel renderer ────────────────────────────────────── */
    const CANVAS_SIZE = 440;
    const PADDING     = 12;

    function drawWheel(canvas, options, rotation) {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = CANVAS_SIZE * dpr;
      canvas.height = CANVAS_SIZE * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      const cx = CANVAS_SIZE / 2;
      const cy = CANVAS_SIZE / 2;
      const r  = CANVAS_SIZE / 2 - PADDING;

      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      /* outer shadow ring */
      ctx.save();
      ctx.shadowColor = 'rgba(120, 80, 220, 0.25)';
      ctx.shadowBlur  = 28;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 4, 0, 2 * Math.PI);
      ctx.fillStyle = 'white';
      ctx.fill();
      ctx.restore();

      if (options.length === 0) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, 2 * Math.PI);
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0, '#f5f0ff');
        grad.addColorStop(1, '#ede9fe');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.font = `500 ${CANVAS_SIZE * 0.055}px Inter, sans-serif`;
        ctx.fillStyle = '#c4b5fd';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Add options below ↓', cx, cy);
        return;
      }

      const n          = options.length;
      const sliceAngle = (2 * Math.PI) / n;

      /* segments */
      for (let i = 0; i < n; i++) {
        const start = rotation + i * sliceAngle;
        const end   = start + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = RAINBOW[i % RAINBOW.length];
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth   = 3;
        ctx.stroke();
      }

      /* outer rim */
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth   = 6;
      ctx.stroke();

      /* labels */
      const maxChars = n <= 4 ? 14 : n <= 7 ? 11 : 9;
      const fontSize = Math.max(10, Math.min(17, Math.floor(r * 0.85 / n * 1.1)));
      for (let i = 0; i < n; i++) {
        const mid = rotation + i * sliceAngle + sliceAngle / 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(mid);
        ctx.textAlign    = 'right';
        ctx.textBaseline = 'middle';
        ctx.font         = `600 ${fontSize}px Inter, sans-serif`;
        ctx.fillStyle    = 'rgba(255,255,255,0.97)';
        ctx.shadowColor  = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur   = 5;
        const label = options[i].length > maxChars
          ? options[i].slice(0, maxChars - 1) + '…'
          : options[i];
        ctx.fillText(label, r - 16, 0);
        ctx.restore();
      }

      /* center hub */
      const hubR = Math.max(18, r * 0.11);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.18)';
      ctx.shadowBlur  = 10;
      ctx.beginPath();
      ctx.arc(cx, cy, hubR, 0, 2 * Math.PI);
      const hubGrad = ctx.createRadialGradient(cx - hubR*0.3, cy - hubR*0.3, 1, cx, cy, hubR);
      hubGrad.addColorStop(0, '#ffffff');
      hubGrad.addColorStop(1, '#e0d7ff');
      ctx.fillStyle = hubGrad;
      ctx.fill();
      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, hubR, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(180,160,240,0.5)';
      ctx.lineWidth   = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, hubR * 0.35, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(160,130,230,0.4)';
      ctx.fill();
    }

    /* ── Wheel component ──────────────────────────────────────────── */
    function Wheel({ options, rotation }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        document.fonts.ready.then(() => drawWheel(canvas, options, rotation));
      }, [options, rotation]);

      return (
        <div className="relative w-full" style={{ aspectRatio: '1 / 1' }}>
          <canvas
            ref={canvasRef}
            style={{ width: '100%', height: '100%', display: 'block' }}
          />
          {/* Pointer pin */}
          <div
            className="absolute left-1/2 pointer-events-none"
            style={{
              top: '-2px',
              transform: 'translateX(-50%)',
              zIndex: 20,
              filter: 'drop-shadow(0 3px 5px rgba(0,0,0,0.3))',
            }}
          >
            <svg width="28" height="36" viewBox="0 0 28 36">
              <polygon points="14,36 0,4 28,4" fill="#1e1b4b" />
              <polygon points="14,36 2,6 26,6" fill="#312e81" />
              <circle cx="14" cy="7" r="5" fill="white" />
              <circle cx="14" cy="7" r="2.5" fill="#7c3aed" />
            </svg>
          </div>
        </div>
      );
    }

    /* ── Persistence: current wheel (unchanged — backward-compatible) ── */
    const LS_KEY          = 'wheel-randomizer-options';
    const SAVED_WHEELS_KEY = 'wheel-randomizer-saved-wheels';
    const FALLBACK_OPTIONS = ['Pizza 🍕', 'Sushi 🍣', 'Burger 🍔', 'Tacos 🌮', 'Pasta 🍝'];

    function loadOptions() {
      try {
        const saved = localStorage.getItem(LS_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) return parsed;
        }
      } catch {}
      return FALLBACK_OPTIONS;
    }

    function saveOptions(opts) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(opts)); } catch {}
    }

    /* ── Persistence: saved wheels library ───────────────────────── */
    function loadSavedWheels() {
      try {
        const raw = localStorage.getItem(SAVED_WHEELS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) return parsed;
        }
      } catch {}
      return [];
    }

    function persistSavedWheels(wheels) {
      try { localStorage.setItem(SAVED_WHEELS_KEY, JSON.stringify(wheels)); } catch {}
    }

    /* ── Main App ─────────────────────────────────────────────────── */
    const initRotation = n => -Math.PI / 2 - Math.PI / Math.max(n, 1);

    function App() {
      const [options,      setOptions]      = useState(loadOptions);
      const [rotation,     setRotation]     = useState(() => initRotation(loadOptions().length));
      const [spinning,     setSpinning]     = useState(false);
      const [result,       setResult]       = useState(null);
      const [editIndex,    setEditIndex]    = useState(null);
      const [editVal,      setEditVal]      = useState('');
      const [newOpt,       setNewOpt]       = useState('');
      const [confirmClear, setConfirmClear] = useState(false);

      /* saved-wheels state */
      const [savedWheels,     setSavedWheels]     = useState(loadSavedWheels);
      const [activeWheelId,   setActiveWheelId]   = useState(null);
      const [showWheelsPanel, setShowWheelsPanel] = useState(false);
      const [newWheelName,    setNewWheelName]    = useState('');
      const [showSaveModal,   setShowSaveModal]   = useState(false);
      const [saveModalName,   setSaveModalName]   = useState('');

      const rotRef           = useRef(initRotation(loadOptions().length));
      const animRef          = useRef(null);
      const editInputRef     = useRef(null);
      const addInputRef      = useRef(null);
      const newWheelNameRef  = useRef(null);
      const wheelsPanelRef   = useRef(null);
      const saveModalNameRef = useRef(null);

      /* close wheels panel on outside click */
      useEffect(() => {
        if (!showWheelsPanel) return;
        const onMouseDown = e => {
          if (wheelsPanelRef.current && !wheelsPanelRef.current.contains(e.target)) setShowWheelsPanel(false);
        };
        document.addEventListener('mousedown', onMouseDown);
        return () => document.removeEventListener('mousedown', onMouseDown);
      }, [showWheelsPanel]);

      /* spin logic */
      const spin = useCallback(() => {
        if (spinning || options.length < 2) return;
        setResult(null);
        setSpinning(true);

        const n          = options.length;
        const sliceAngle = (2 * Math.PI) / n;
        const targetIdx  = Math.floor(Math.random() * n);

        const baseAngle  = -Math.PI / 2 - (targetIdx + 0.5) * sliceAngle;
        const curMod     = ((rotRef.current % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        const baseMod    = ((baseAngle      % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        let   delta      = baseMod - curMod;
        if (delta <= 0) delta += 2 * Math.PI;
        const spins      = 5 + Math.floor(Math.random() * 4);
        const totalDelta = delta + spins * 2 * Math.PI;
        const startRot   = rotRef.current;
        const duration   = 4200 + Math.random() * 1600;
        const startTime  = performance.now();
        const easeOut    = t => 1 - Math.pow(1 - t, 4);

        const frame = now => {
          const t = Math.min((now - startTime) / duration, 1);
          const r = startRot + totalDelta * easeOut(t);
          rotRef.current = r;
          setRotation(r);
          if (t < 1) {
            animRef.current = requestAnimationFrame(frame);
          } else {
            setSpinning(false);
            setResult(options[targetIdx]);
          }
        };
        animRef.current = requestAnimationFrame(frame);
      }, [spinning, options]);

      /* persist current wheel options */
      useEffect(() => { saveOptions(options); }, [options]);

      /* persist saved wheels library */
      useEffect(() => { persistSavedWheels(savedWheels); }, [savedWheels]);

      /* auto-save options into active wheel whenever they change */
      useEffect(() => {
        if (!activeWheelId) return;
        setSavedWheels(prev => prev.map(w =>
          w.id === activeWheelId ? { ...w, options: [...options] } : w
        ));
      }, [options, activeWheelId]);

      /* cleanup on unmount */
      useEffect(() => () => cancelAnimationFrame(animRef.current), []);

      /* options CRUD */
      const addOption = () => {
        const val = newOpt.trim();
        if (!val) return;
        setOptions(p => [...p, val]);
        setNewOpt('');
        setResult(null);
        setTimeout(() => addInputRef.current?.focus(), 10);
      };

      const deleteOption = i => {
        setOptions(p => p.filter((_, j) => j !== i));
        setResult(null);
      };

      const startEdit = i => {
        setEditIndex(i);
        setEditVal(options[i]);
        setTimeout(() => editInputRef.current?.focus(), 30);
      };

      const saveEdit = () => {
        const val = editVal.trim();
        if (val) setOptions(p => p.map((o, i) => i === editIndex ? val : o));
        setEditIndex(null);
        setResult(null);
      };

      const clearAll = () => {
        if (confirmClear) {
          setOptions([]);
          setResult(null);
          setConfirmClear(false);
        } else {
          setConfirmClear(true);
          setTimeout(() => setConfirmClear(false), 3000);
        }
      };

      /* ── saved-wheels handlers ─────────────────────────────────── */
      const createWheel = () => {
        const name = newWheelName.trim();
        if (!name) return;
        const newWheel = { id: String(Date.now()), name, options: [...options] };
        setSavedWheels(prev => [...prev, newWheel]);
        setActiveWheelId(newWheel.id);
        setNewWheelName('');
        setTimeout(() => newWheelNameRef.current?.focus(), 10);
      };

      const saveAsWheel = () => {
        const name = saveModalName.trim();
        if (!name) return;
        const newWheel = { id: String(Date.now()), name, options: [...options] };
        setSavedWheels(prev => [...prev, newWheel]);
        setActiveWheelId(newWheel.id);
        setShowSaveModal(false);
        setSaveModalName('');
      };

      const openSaveModal = () => {
        setSaveModalName('');
        setShowSaveModal(true);
        setTimeout(() => saveModalNameRef.current?.focus(), 30);
      };

      const loadSavedWheel = wheel => {
        setOptions(wheel.options);
        setActiveWheelId(wheel.id);
        setResult(null);
        setShowWheelsPanel(false);
      };

      const deleteSavedWheel = id => {
        setSavedWheels(prev => prev.filter(w => w.id !== id));
        if (activeWheelId === id) setActiveWheelId(null);
      };

      const canSpin = !spinning && options.length >= 2;
      const activeWheelName = activeWheelId
        ? (savedWheels.find(w => w.id === activeWheelId)?.name ?? null)
        : null;

      return (
        <>
        <div className="min-h-screen py-6 px-4">
          <div className="max-w-md mx-auto flex flex-col gap-5">

            {/* ── Title ── */}
            <div className="text-center pt-2">
              <h1
                className="text-4xl font-extrabold tracking-tight"
                style={{ background: 'linear-gradient(135deg,#7c3aed,#c084fc,#f472b6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}
              >
                Wheel Randomizer
              </h1>
              <p className="text-sm text-violet-400 mt-1 font-medium">Spin and let fate decide ✨</p>
            </div>

            {/* ── Wheel card ── */}
            <div className="card rounded-3xl shadow-2xl p-5 pb-6 relative" style={{ boxShadow: '0 20px 60px rgba(124,58,237,0.13)' }}>

              {/* My Wheels — top-left corner of the card */}
              <div className="absolute top-4 left-4 z-20" ref={wheelsPanelRef}>
                <button
                  className={`wheel-corner-btn ${showWheelsPanel ? 'open' : ''}`}
                  onClick={() => setShowWheelsPanel(p => !p)}
                  title="My saved wheels"
                >
                  <LayersIcon />
                  {savedWheels.length > 0 && <span>{savedWheels.length}</span>}
                </button>

                {showWheelsPanel && (
                  <div className="float-panel mt-1" style={{ width: '272px', left: 0, right: 'auto' }}>
                    <div className="px-4 pt-4 pb-2">
                      <p className="text-xs font-bold uppercase tracking-widest text-violet-400">My Wheels</p>
                    </div>

                    {savedWheels.length === 0 ? (
                      <p className="text-xs text-gray-400 text-center px-4 pb-3">No saved wheels yet. Create one below!</p>
                    ) : (
                      <div className="scroll-area flex flex-col gap-1 max-h-52 overflow-y-auto px-2">
                        {savedWheels.map(wheel => (
                          <div
                            key={wheel.id}
                            className={`wheel-row flex items-center gap-3 px-3 py-2.5 ${wheel.id === activeWheelId ? 'is-active' : ''}`}
                          >
                            <div className="flex-1 min-w-0">
                              <p className="text-sm font-semibold text-gray-700 truncate">{wheel.name}</p>
                              <p className="text-xs text-gray-400 mt-0.5">
                                {wheel.options.length} option{wheel.options.length !== 1 ? 's' : ''}
                              </p>
                            </div>
                            <button
                              onClick={() => wheel.id !== activeWheelId && loadSavedWheel(wheel)}
                              className={`load-btn ${wheel.id === activeWheelId ? 'current' : ''}`}
                            >
                              {wheel.id === activeWheelId ? 'Active' : 'Load'}
                            </button>
                            <button
                              onClick={() => deleteSavedWheel(wheel.id)}
                              className="icon-btn text-gray-300 hover:text-rose-400 flex-shrink-0 p-1"
                              title="Delete saved wheel"
                            >
                              <TrashIcon />
                            </button>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* new wheel input — mirrors the options add row */}
                    <div className="flex gap-2 px-3 py-3 border-t border-gray-100 mt-1">
                      <input
                        ref={newWheelNameRef}
                        className="flex-1 bg-gray-50 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 focus:border-violet-300 transition-all"
                        placeholder="New wheel name…"
                        value={newWheelName}
                        onChange={e => setNewWheelName(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && createWheel()}
                      />
                      <button
                        onClick={createWheel}
                        disabled={!newWheelName.trim()}
                        className="add-btn w-9 h-9 flex items-center justify-center rounded-xl text-white flex-shrink-0 disabled:opacity-40"
                        title="Create wheel"
                      >
                        <PlusIcon />
                      </button>
                    </div>
                  </div>
                )}
              </div>

              {/* wheel — result overlays it so the card never resizes */}
              <div className="max-w-xs mx-auto relative">
                <Wheel options={options} rotation={rotation} />

                {result && !spinning && (
                  <div
                    className="result-pop absolute left-4 right-4 top-1/2 -translate-y-1/2 flex flex-col items-center justify-center rounded-3xl py-6"
                    style={{
                      background: 'linear-gradient(135deg, rgba(109,40,217,0.82), rgba(167,139,250,0.82))',
                      backdropFilter: 'blur(10px)',
                    }}
                  >
                    <p className="text-xs font-bold uppercase tracking-[0.2em] text-purple-200 mb-2">🎉 Winner!</p>
                    <p className="text-white text-2xl font-extrabold leading-snug text-center px-8 break-words">{result}</p>
                    <button
                      onClick={() => {
                        setOptions(p => p.filter(o => o !== result));
                        setResult(null);
                      }}
                      className="remove-winner-btn mt-5 px-5 py-2.5 rounded-xl text-xs font-semibold flex items-center gap-2 transition-all duration-150"
                    >
                      <TrashIcon />
                      Remove from wheel
                    </button>
                  </div>
                )}
              </div>

              {/* spin button */}
              <button
                onClick={spin}
                disabled={!canSpin}
                className="spin-btn mt-4 w-full py-4 rounded-2xl font-bold text-lg text-white"
              >
                {spinning
                  ? '🌀 Spinning…'
                  : options.length < 2
                    ? 'Add at least 2 options'
                    : '🎯 Spin the Wheel!'}
              </button>
            </div>

            {/* ── Options card ── */}
            <div className="card rounded-3xl shadow-2xl p-5" style={{ boxShadow: '0 20px 60px rgba(124,58,237,0.10)' }}>

              {/* card header */}
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-2 min-w-0">
                  <h2 className="text-base font-bold text-gray-700 flex-shrink-0">Options</h2>
                  <span className="text-xs font-semibold text-violet-500 bg-violet-100 px-3 py-1 rounded-full flex-shrink-0">
                    {options.length}
                  </span>
                  {activeWheelName && (
                    <span className="flex items-center gap-1 text-xs text-violet-400 font-medium truncate min-w-0">
                      <span className="text-violet-300 flex-shrink-0">·</span>
                      <FolderIcon />
                      <span className="truncate">{activeWheelName}</span>
                    </span>
                  )}
                </div>

                <div className="flex items-center gap-1.5">
                  {/* Save as wheel — only when no active wheel and options exist */}
                  {!activeWheelId && options.length > 0 && (
                    <button
                      onClick={openSaveModal}
                      className="flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-xl transition-all duration-200 bg-violet-50 text-violet-600 hover:bg-violet-100"
                    >
                      <BookmarkIcon />
                      Save as wheel
                    </button>
                  )}
                  {/* Clear all */}
                  {options.length > 0 && (
                    <button
                      onClick={clearAll}
                      disabled={spinning}
                      className="flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-xl transition-all duration-200 disabled:opacity-30"
                      style={confirmClear
                        ? { background: '#fee2e2', color: '#ef4444' }
                        : { background: '#f3f4f6', color: '#9ca3af' }
                      }
                      title="Clear all options"
                    >
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                      </svg>
                      {confirmClear ? 'Confirm?' : 'Clear'}
                    </button>
                  )}
                </div>
              </div>

              {/* list */}
              <div className="scroll-area flex flex-col gap-2 max-h-72 overflow-y-auto pr-1">
                {options.length === 0 && (
                  <div className="text-center py-10 text-gray-400">
                    <div className="text-5xl mb-3">🎡</div>
                    <p className="text-sm">No options yet — add some below!</p>
                  </div>
                )}

                {options.map((opt, i) => (
                  <div
                    key={i}
                    className="opt-row flex items-center gap-3 px-4 py-3 bg-gray-50 rounded-2xl"
                  >
                    {/* color dot */}
                    <div
                      className="w-3 h-3 rounded-full flex-shrink-0 ring-2 ring-white"
                      style={{ backgroundColor: RAINBOW[i % RAINBOW.length], boxShadow: `0 0 0 2px ${RAINBOW[i % RAINBOW.length]}44` }}
                    />

                    {/* label / edit input */}
                    {editIndex === i ? (
                      <input
                        ref={editInputRef}
                        className="flex-1 text-sm font-medium text-gray-700 bg-white border-2 border-violet-300 rounded-xl px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-violet-300"
                        value={editVal}
                        onChange={e => setEditVal(e.target.value)}
                        onBlur={saveEdit}
                        onKeyDown={e => {
                          if (e.key === 'Enter') saveEdit();
                          if (e.key === 'Escape') setEditIndex(null);
                        }}
                      />
                    ) : (
                      <span className="flex-1 text-sm font-medium text-gray-700 truncate">{opt}</span>
                    )}

                    {/* action buttons */}
                    {editIndex === i ? (
                      <button onClick={saveEdit} className="icon-btn text-green-500 flex-shrink-0 p-1">
                        <CheckIcon />
                      </button>
                    ) : (
                      <div className="flex items-center gap-1 flex-shrink-0">
                        <button
                          onClick={() => startEdit(i)}
                          disabled={spinning}
                          className="icon-btn text-gray-400 hover:text-violet-500 p-1 disabled:opacity-30"
                          title="Edit"
                        >
                          <EditIcon />
                        </button>
                        <button
                          onClick={() => deleteOption(i)}
                          disabled={spinning}
                          className="icon-btn text-gray-400 hover:text-rose-500 p-1 disabled:opacity-30"
                          title="Delete"
                        >
                          <TrashIcon />
                        </button>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {/* add new option */}
              <div className="flex gap-2 mt-4">
                <input
                  ref={addInputRef}
                  className="flex-1 bg-gray-50 border-2 border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 focus:border-violet-300 transition-all"
                  placeholder="Type an option…"
                  value={newOpt}
                  disabled={spinning}
                  onChange={e => setNewOpt(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addOption()}
                />
                <button
                  onClick={addOption}
                  disabled={!newOpt.trim() || spinning}
                  className="add-btn w-12 h-12 flex items-center justify-center rounded-2xl text-white text-2xl font-bold flex-shrink-0"
                  style={{ lineHeight: 1 }}
                  title="Add option"
                >
                  +
                </button>
              </div>
            </div>

            <p className="text-center text-xs text-gray-400 pb-4">
              Press <kbd className="bg-white rounded-md px-1.5 py-0.5 text-xs shadow-sm border border-gray-200">Enter</kbd> to add · click ✏️ to edit · click 🗑️ to remove
            </p>

          </div>
        </div>

        {/* ── Save-as-wheel modal ── */}
        {showSaveModal && (
          <div className="modal-backdrop" onMouseDown={e => { if (e.target === e.currentTarget) setShowSaveModal(false); }}>
            <div className="modal-card">
              <h2 className="text-xl font-extrabold text-gray-800 mb-1">Save as wheel</h2>
              <p className="text-sm text-gray-400 mb-5">Give your options a name so they're saved and tracked automatically.</p>

              <input
                ref={saveModalNameRef}
                className="w-full bg-gray-50 border-2 border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 focus:border-violet-300 transition-all"
                placeholder="e.g. Dinner options"
                value={saveModalName}
                onChange={e => setSaveModalName(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter') saveAsWheel();
                  if (e.key === 'Escape') setShowSaveModal(false);
                }}
              />

              <div className="flex gap-3 mt-4">
                <button
                  onClick={() => setShowSaveModal(false)}
                  className="flex-1 py-3 rounded-2xl text-sm font-semibold text-gray-400 bg-gray-100 hover:bg-gray-200 transition-colors"
                >
                  Cancel
                </button>
                <button
                  onClick={saveAsWheel}
                  disabled={!saveModalName.trim()}
                  className="spin-btn flex-1 py-3 rounded-2xl text-sm font-bold text-white disabled:opacity-40"
                >
                  Save wheel
                </button>
              </div>
            </div>
          </div>
        )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
